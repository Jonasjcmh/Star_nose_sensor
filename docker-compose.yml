# Universal Robots simulator (URSim) for UR5 development & testing
#
# Quick start:
#   docker compose up -d
#   open http://localhost:6080/vnc.html      ← Polyscope UI (3D robot view)
#
# Connect your Python code to the simulator:
#   UR_ROBOT_IP=127.0.0.1 python Integration_2/main.py --sim --no-sofa --no-viz
#   python Integration_2/robot_viz_3d.py --sim
#
# Notes:
#   • On Apple Silicon (M1/M2/M3): Docker Desktop must have Rosetta enabled
#     (Docker Settings → General → "Use Rosetta for x86/amd64 emulation")
#   • URSim starts in e-Series mode. The RTDE / trajectory interface is
#     identical to CB3 (UR5 original) — all existing Python code works unchanged.
#   • First boot takes ~30s. Watch logs: docker compose logs -f ursim

services:
  ursim:
    image: universalrobots/ursim_e-series
    platform: linux/amd64      # required on Apple Silicon (Rosetta emulation)
    stdin_open: true
    tty: true
    ports:
      - "6080:6080"    # noVNC  →  http://localhost:6080/vnc.html
      - "5900:5900"    # VNC client (any VNC app, password: secret)
      - "29999:29999"  # Dashboard server (program load/start/stop)
      - "30001:30001"  # Primary client interface
      - "30002:30002"  # Secondary client interface
      - "30003:30003"  # Realtime client (500 Hz)
      - "30004:30004"  # RTDE  ←  rtde_control / rtde_receive connect here
    environment:
      - ROBOT_MODEL=UR5
    volumes:
      - ursim_programs:/ursim/programs   # persist robot programs across restarts
    restart: unless-stopped

volumes:
  ursim_programs:
    driver: local
